<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Border, background</title>
    <style>
       p{
        border-style: solid;
        border-color: red;
        border-width: 4px;
        border-radius: 20px;
        border-top-color: blueviolet;
        border-bottom-style: dashed;
        border-bottom-left-radius: 50%;
        border-bottom-right-radius: 50%;
       }
       
       body{
        /*background: linear-gradient(orange, green);
        background-repeat: no-repeat;
        background-attachment: fixed;*/

        background-image: url("obrazek.webp");
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;

       }
    </style>
</head>
<body>
    <p>
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Sapiente delectus ullam quam minus! Eum perspiciatis fugiat veritatis aut, a voluptatibus dicta laudantium excepturi odio, fugit aliquam odit totam iure quisquam!
    </p>
</body>
</html>
