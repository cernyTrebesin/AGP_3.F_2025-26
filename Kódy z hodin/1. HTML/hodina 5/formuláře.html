<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="idtext">Jméno:</label>
        <input type="text" id="idtext"> <br>
        <label for="heslo">Heslo:</label>
        <input type="password" id="heslo"> <br>
        <label for="Datum">Datum:</label>
        <input type="date" id="datum"> <br>
        <label for="email">Email:</label>
        <input type="email" id="email"><br>
        <label for="telefon">Telefoní číslo:</label>
        <input type="tel" id="telefon">
        <label for="číslo">Číslo:</label>
        <input type="number" id="číslo" min="0" max="10">
        <br>   
        <label for="muz">Muž</label>
        <input type="radio" id="muz" name="pohlavi">
        <label for="zena">Žena</label>
        <input type="radio" id="zena" name="pohlavi">
        <label for="jine">Jiné</label>
        <input type="radio" id="jine" name="pohlavi">
        <br>
        <label for="ano">Ano</label>
        <input type="checkbox" name="nevim" id="ano">
        <label for="ne">Ne</label>
        <input type="checkbox" name="nevim" id="ne">
        <br>
        <input type="submit">
        <input type="reset">

    </form>
</body>
</html>
