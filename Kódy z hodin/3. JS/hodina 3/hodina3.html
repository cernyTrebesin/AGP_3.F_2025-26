<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podmínky</title>
</head>
<body>
    <script>
        let cislo = window.prompt("Zadej číslo")
        if(cislo > 10){
            alert("Zadal jsi číslo větší než 10")
        }else if(cislo == 10){
            alert("Zadal jsi 10")
        }
        else{
            alert("Zadané číslo je menší než 10")
        }
        /*if(>= > <= < == === !=)*/
        /* 1 == "1" 1 === "1" */
    </script>
</body>
</html>
